main:
  vscode:
    - docker:
        image: docker.cnb.cool/liyao52033/images/debian:latest
      runner:
        cpus: 16
      services:
        - vscode
        - docker
      stages:
        - name: 默认安装依赖
          script: |
            ls -al

  push:
    - services:
        - docker
      stages:
        - name: Generate Build Metadata
          script: |
            echo "VERSION=${CNB_TAG}" >> .cnb.env
            echo "COMMIT=$(git rev-parse --short HEAD)" >> .cnb.env
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .cnb.env
        - name: docker build
          script: |
            if [ -f .cnb.env ]; then
              source .cnb.env
            fi
            docker build \
              --build-arg VERSION="${VERSION:-dev}" \
              --build-arg COMMIT="${COMMIT:-none}" \
              --build-arg BUILD_DATE="${BUILD_DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}" \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest .
        - name: docker push
          script: docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
        - name: sync to github
          image: tencentcom/git-sync
          imports: https://cnb.cool/liyao52033/envs/-/blob/main/github-env.yml
          settings:
            target_url: https://github.com/liyao52033668/CLIProxyAPIPlus.git
            auth_type: https
            git_user: ${GIT_USERNAME_NEW}
            git_email: ${GIT_EMAIL_NEW}
            username: ${GIT_USERNAME_NEW}
            password: ${GIT_ACCESS_TOKEN_NEW}