main:
  vscode:
    - docker:
        image: docker.cnb.cool/liyao52033/images/debian:latest
      runner:
        cpus: 16
      services:
        - vscode
        - docker
      stages:
        - name: 默认安装依赖
          script: |
            ls -al

  push:
    - services:
        - docker
      stages:
        # - name: commitlint
        #   image: cnbcool/commitlint
        - name: auto-tag
          image: cnbcool/git-auto-tag:latest
          settings:
            tagFormat: v\${version}
            toFile: tag_info.json
            dryRun: false
            blockWhenFail: false
            # releaseRules: ./release-rules.json
            branch: $CNB_BRANCH
            repoUrlHttps: $CNB_REPO_URL_HTTPS
          exports:
            tag: NEW_TAG
        - name: show tag
          script: echo $NEW_TAG
        - name: show tag res
          script: |
            if [ -f tag_info.json ]; then cat tag_info.json; else echo "tag_info.json not found, skipping"; fi
        - name: generate changelog and create release
          script: |
            # New tag from auto-tag stage; fall back to latest tag if empty
            CURRENT_TAG="${NEW_TAG:-$(git tag --sort=-v:refname | head -n 1 || echo "")}"
            # Previous tag (excluding CURRENT_TAG)
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || echo "")

            echo "=== Release Info ==="
            echo "CURRENT_TAG: ${CURRENT_TAG}"
            echo "PREV_TAG:    ${PREV_TAG}"

            # Generate changelog from commit history
            REPO_URL="https://cnb.cool/liyao52033/CLIProxyAPIPlus"
            if [ -n "${PREV_TAG}" ]; then
              RANGE="${PREV_TAG}..${CURRENT_TAG}"
            else
              RANGE="-50"
            fi

            echo "=== Changelog (max 200 commits) ==="
            # Limit changelog to 200 commits to avoid exceeding API payload size limits
            git log ${RANGE} --pretty=format:"- [%h](${REPO_URL}/-/commit/%H) %s" --no-merges -200 > /tmp/changelog.txt
            cat /tmp/changelog.txt

            # Ensure body does not exceed 80KB to stay within API limits
            BODY_SIZE=$(wc -c < /tmp/changelog.txt)
            echo "Changelog body size: ${BODY_SIZE} bytes"
            if [ "${BODY_SIZE}" -gt 80000 ]; then
              echo "WARNING: Changelog exceeds 80KB, truncating..."
              head -c 80000 /tmp/changelog.txt > /tmp/changelog_trimmed.txt
              echo "" >> /tmp/changelog_trimmed.txt
              echo "... (truncated, full history available in git log)" >> /tmp/changelog_trimmed.txt
              mv /tmp/changelog_trimmed.txt /tmp/changelog.txt
            fi

            # Check if release already exists
            EXIST_RELEASE=$(curl --silent --fail --request GET \
              --url "${CNB_API_ENDPOINT}/liyao52033/CLIProxyAPIPlus/-/releases/tags/${CURRENT_TAG}" \
              --header "Accept: application/vnd.cnb.api+json" \
              --header "Authorization: Bearer ${CNB_TOKEN}" || echo "")

            if [ -n "${EXIST_RELEASE}" ]; then
              echo "Release ${CURRENT_TAG} already exists, skip creation"
            else
              # Build JSON payload to a file to avoid ARG_MAX when passing via curl --data
              jq -Rs \
                --arg tag_name "${CURRENT_TAG}" \
                '{tag_name: $tag_name, name: $tag_name, body: ., draft: false, prerelease: false, make_latest: "true"}' \
                /tmp/changelog.txt > /tmp/release_payload.json

              # Use --data @file to avoid shell argument length limits
              # Do NOT use set -e so that a release creation failure doesn't block downstream stages
              HTTP_CODE=$(curl --write-out "%{http_code}" --silent --output /tmp/release_response.txt \
                --request POST \
                --url "${CNB_API_ENDPOINT}/liyao52033/CLIProxyAPIPlus/-/releases" \
                --header "Accept: application/vnd.cnb.api+json" \
                --header "Authorization: Bearer ${CNB_TOKEN}" \
                --header "Content-Type: application/json" \
                --data @/tmp/release_payload.json)

              if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
                echo "✅ Release ${CURRENT_TAG} created successfully"
              else
                echo "⚠️ Failed to create release ${CURRENT_TAG} (HTTP ${HTTP_CODE})"
                cat /tmp/release_response.txt
                echo "Release creation skipped — continuing pipeline"
              fi
            fi
        - name: prepare build args
          imports: https://cnb.cool/liyao52033/envs/-/blob/main/envs.yml
          script: |
              VERSION="${NEW_TAG:-$(git tag --sort=-v:refname | head -n 1 || echo "")}"
              COMMIT="${CNB_COMMIT:-$(git rev-parse --short HEAD 2>/dev/null || echo none)}"
              BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

              echo "=== Build Args ==="
              echo "VERSION:   ${VERSION}"
              echo "COMMIT:    ${COMMIT}"
              echo "BUILD_DATE: ${BUILD_DATE}"
              if [ -n "${CPA_TOKEN}" ]; then echo "CPA_TOKEN: get"; else echo "CPA_TOKEN: not found"; fi

              docker build \
                --build-arg VERSION="${VERSION}" \
                --build-arg COMMIT="${COMMIT}" \
                --build-arg BUILD_DATE="${BUILD_DATE}" \
                --build-arg CPA_TOKEN="${CPA_TOKEN}" \
                -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
                .
        - name: docker push
          script: |
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
        - name: sync to github
          image: tencentcom/git-sync
          imports: https://cnb.cool/liyao52033/envs/-/blob/main/github-env.yml
          settings:
            target_url: https://github.com/liyao52033668/CLIProxyAPIPlus.git
            auth_type: https
            branch: main
            git_user: ${GIT_USERNAME_NEW}
            git_email: ${GIT_EMAIL_NEW}
            username: ${GIT_USERNAME_NEW}
            password: ${GIT_ACCESS_TOKEN_NEW}
            push_tags: true
  
   
  pull_request:
    - stages:
        - name: code-review
          image: cnbcool/code-review:latest
          settings:
            # 输出文件路径
            output: ./code_review.json
            context: 10
            comment: true
            max_comments: 10
            max_diff_size: 100000
            # 是否在代码评审发现严重问题时返回非零退出码（流水线会失败）
            fail_on_critical: true
            # 指定 AI 模型
            # model: glm-4.7
            # AI 最大轮数限制（可选）
            # max_turns: 3
            # 将 prompt 输出到文件（调试用）
            # prompt_output: ./prompt.txt

